<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% if student %}Edit{% else %}New{% endif %} Student</title>
    <style>
        body{font-family:Arial, sans-serif;padding:20px}
        label{display:block;margin-top:10px;font-size:0.9rem}
        input,select{padding:8px;width:100%;max-width:360px;border:1px solid #ccc;border-radius:4px}
        button{margin-top:12px;padding:8px 12px;background:#667eea;color:#fff;border:none;border-radius:4px}
    </style>
</head>
<body>
    <h1>{% if student %}Edit{% else %}New{% endif %} Student</h1>
    <form method="post">
        <label>Name</label>
        <input name="stu_name" value="{{ student.stu_name if student else '' }}" required />
        <label>Birth (YYYY-MM-DD)</label>
        <input name="stu_birth" value="{{ student.stu_birth.isoformat() if student and student.stu_birth else '' }}" />
        <label>Gender</label>
        <select name="stu_gender">
            <option value="">-</option>
            <option value="Male" {% if student and student.stu_gender=='Male' %}selected{% endif %}>Male</option>
            <option value="Female" {% if student and student.stu_gender=='Female' %}selected{% endif %}>Female</option>
            <option value="Other" {% if student and student.stu_gender=='Other' %}selected{% endif %}>Other</option>
        </select>
        <label>Email</label>
        <input name="stu_email" value="{{ student.stu_email if student else '' }}" />
        <label>Phone</label>
        <input name="stu_phone" value="{{ student.stu_phone if student else '' }}" />
        <div>
            <button type="submit">Save</button>
            <a href="/students" style="margin-left:8px">Cancel</a>
        </div>
    </form>
</body>
</html>
