<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .banner {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .banner img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }
        .banner-text {
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .logout-btn {
            color: white;
            background: rgba(0,0,0,0.3);
            padding: 10px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.3s ease;
            display: inline-block;
        }
        .logout-btn:hover {
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
        <div class="banner">
                <span class="banner-text">Welcome to Our Site</span>
                <div style="position:absolute;right:16px;top:12px">
                    {% if current_user.is_authenticated and current_user.username == 'admin' %}
                        <a href="{{ url_for('admin_users') }}" style="color:white; background:rgba(0,0,0,0.18); padding:8px 12px; border-radius:6px; text-decoration:none">Admin</a>
                    {% endif %}
                </div>
                <div style="position:absolute;right:16px;bottom:16px">
                    {% if current_user.is_authenticated %}
                        <a href="{{ url_for('logout') }}" class="logout-btn" onclick="fetch('{{ url_for('logout') }}', {method: 'GET', credentials: 'include'}).then(() => { window.top.location.href = '{{ url_for('home') }}'; }); return false;">Logout</a>
                    {% endif %}
                </div>
        </div>
</body>
</html>
