<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .tabs-container {
            display: flex;
            gap: 4px;
            align-items: center;
            position: absolute;
            bottom: -8px;
            left: 20px;
        }
        .user-tab {
            color: white;
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 6px 6px 0 0;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            border-bottom: none;
            font-size: 0.9rem;
        }
        .user-tab:hover {
            background: rgba(255,255,255,0.25);
        }
        .user-tab.active {
            background: #f9f9f9;
            color: #333;
            border-color: #f9f9f9;
        }
        .logout-link {
            color: white;
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 6px 6px 0 0;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            border-bottom: none;
            font-size: 0.9rem;
        }
        .logout-link:hover {
            background: rgba(255,255,255,0.25);
        }
        .logout-link.active {
            background: #f9f9f9;
            color: #333;
            border-color: #f9f9f9;
        }
        .school-tab {
            color: white;
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 6px 6px 0 0;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            border-bottom: none;
            font-size: 0.9rem;
        }
        .school-tab:hover {
            background: rgba(255,255,255,0.25);
        }
        .school-tab.active {
            background: #f9f9f9;
            color: #333;
            border-color: #f9f9f9;
        }
        .banner {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .banner img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }
        .banner-text {
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="banner">
        <span class="banner-text">Welcome to Our Site</span>
        {% if current_user.is_authenticated %}
        <div class="tabs-container">
            <button class="user-tab" id="userTabBtn" onclick="setActiveTab('user'); window.parent.postMessage({type: 'viewUserInfo'}, '*')">👤 User</button>
            <button class="school-tab" id="schoolTabBtn" onclick="setActiveTab('school'); window.parent.postMessage({type: 'viewSchools'}, '*')">📚 Schools</button>
            <a href="{{ url_for('logout') }}" class="logout-link" onclick="fetch('{{ url_for('logout') }}', {method: 'GET', credentials: 'include'}).then(() => { window.top.location.href = '{{ url_for('home') }}'; }); return false;">🚪 Logout</a>
        </div>
        {% endif %}
    </div>
    
    <script>
        function setActiveTab(tabName) {
            var schoolTab = document.getElementById('schoolTabBtn');
            var userTab = document.getElementById('userTabBtn');
            
            schoolTab.classList.remove('active');
            userTab.classList.remove('active');
            
            if (tabName === 'school') {
                schoolTab.classList.add('active');
            } else if (tabName === 'user') {
                userTab.classList.add('active');
            }
        }
        
        // Set user button as active by default on page load
        window.addEventListener('load', function() {
            setActiveTab('user');
            // Load user info page in infoFrame when banner loads
            window.parent.postMessage({type: 'viewUserInfo'}, '*');
        });
        
        // Listen for messages from parent to clear active state when navigating away
        window.addEventListener('message', function(event) {
            var schoolTab = document.getElementById('schoolTabBtn');
            var userTab = document.getElementById('userTabBtn');
            if (event.data.type === 'clearActiveTab') {
                if (schoolTab) {
                    schoolTab.classList.remove('active');
                }
                if (userTab) {
                    userTab.classList.remove('active');
                }
            }
        });
    </script>
</body>
</html>
