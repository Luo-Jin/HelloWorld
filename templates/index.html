<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .iframe-container {
            width: 100%;
        }
        .banner-frame {
            height: 80px;
            border: none;
        }
        .dropdown-frame {
            height: 100px;
            border: none;
        }
        .info-frame {
            flex: 1;
            border: none;
            min-height: 300px;
        }
        iframe {
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- Top iframe: Banner -->
    <iframe src="/banner" class="banner-frame" title="Banner"></iframe>
    
    <!-- Single iframe: Filters + Info combined -->
    <iframe src="/info" class="info-frame" title="Filters and Information" name="infoFrame" id="infoFrame"></iframe>
    
    <script>
        window.addEventListener('message', function(event) {
            var infoFrame = document.getElementById('infoFrame');
            
            if (event.data.type === 'applyFilters') {
                var params = [];
                
                if (event.data.region) {
                    params.push('region=' + encodeURIComponent(event.data.region));
                }
                if (event.data.schoolType) {
                    params.push('school_type=' + encodeURIComponent(event.data.schoolType));
                }
                if (event.data.tour) {
                    params.push('tour=' + encodeURIComponent(event.data.tour));
                }
                
                if (params.length > 0) {
                    infoFrame.src = '/info?' + params.join('&');
                } else {
                    infoFrame.src = '/info';
                }
                
                // Clear active button state when filters are applied
                var bannerFrame = document.querySelector('.banner-frame');
                if (bannerFrame && bannerFrame.contentWindow) {
                    bannerFrame.contentWindow.postMessage({type: 'clearActiveTab'}, '*');
                }
            } else if (event.data.type === 'viewUserInfo') {
                infoFrame.src = '/user_info';
            } else if (event.data.type === 'viewSchools') {
                infoFrame.src = '/info';
            }
        });
    </script>
</body>
</html>
