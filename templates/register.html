<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register</title>
  <style>
    body{font-family:Arial, sans-serif;background:#f7f8fb;padding:24px}
    .card{background:#fff;padding:20px;border-radius:8px;max-width:420px;margin:40px auto;box-shadow:0 6px 18px rgba(22,27,44,0.06)}
    label{display:block;margin-top:12px;font-size:0.9rem}
    input{padding:10px;width:100%;box-sizing:border-box;border:1px solid #ddd;border-radius:6px}
    button{margin-top:16px;padding:10px 14px;background:#2b6cb0;color:#fff;border:none;border-radius:6px}
    .flash{color:#b00020;margin-bottom:8px}
  </style>
</head>
<body>
  <div class="card">
    <h2>Create Account</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">
          {% for m in messages %} <div>{{ m }}</div> {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    <form method="post" action="/register">
      <label for="username">Username</label>
      <input id="username" name="username" required />
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required />
      <small>We will send a verification link to this email address.</small>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required />
      <label for="password2">Confirm password</label>
      <input id="password2" name="password2" type="password" required />
      <div>
        <button type="submit">Register</button>
        <a href="/" style="margin-left:12px">Back to login</a>
      </div>
    </form>
    <script>
      document.querySelector('form').addEventListener('submit', function(e){
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const p = document.getElementById('password').value;
        const p2 = document.getElementById('password2').value;
        const msgs = [];
        if(!username) msgs.push('Username is required.');
        if(!email) msgs.push('Email is required.');
        if(!p) msgs.push('Password is required.');
        if(p !== p2) msgs.push('Passwords do not match.');
        if(msgs.length){
          e.preventDefault();
          let flash = document.querySelector('.flash');
          if(!flash){ flash = document.createElement('div'); flash.className = 'flash'; document.querySelector('.card').insertBefore(flash, document.querySelector('form')); }
          flash.innerHTML = msgs.map(m => '<div>'+m+'</div>').join('');
          return false;
        }
      });
    </script>
  </div>
</body>
</html>
