<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Filters</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }
        .dropdown-container {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            padding: 10px 20px;
            gap: 15px;
        }
        .dropdown-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dropdown-wrapper label {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 5px;
        }
        select {
            padding: 8px 15px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: white;
            cursor: pointer;
            min-width: 120px;
        }
        select:hover {
            border-color: #667eea;
        }
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body>
    <div class="dropdown-container">
        <div class="dropdown-wrapper">
            <label for="category">Region</label>
            <select id="category" name="category" onchange="applyFilters()">
                <option value="">All Regions</option>
                {% for region in regions %}
                <option value="{{ region }}">{{ region }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="dropdown-wrapper">
            <label for="schoolType">School Type</label>
            <select id="schoolType" name="schoolType" onchange="applyFilters()">
                <option value="">All Types</option>
                {% for type in school_types %}
                <option value="{{ type }}">{{ type }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="dropdown-wrapper">
            <label for="tourFilter">Tour</label>
            <select id="tourFilter" name="tourFilter" onchange="applyFilters()">
                <option value="">Any</option>
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>
    </div>
    <script>
        function applyFilters() {
            var region = document.getElementById('category').value;
            var schoolType = document.getElementById('schoolType').value;
                var tour = document.getElementById('tourFilter').value;
            
                window.parent.postMessage({
                    type: 'applyFilters',
                    region: region,
                    schoolType: schoolType,
                    tour: tour
                }, '*');
        }
    </script>
</body>
</html>
