<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schools Information</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #fff;
            padding: 10px;
            font-size: 14px;
        }
        .info-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .info-header {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 6px 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #667eea;
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: 13px;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .school-logo {
            width: 28px;
            height: 28px;
            object-fit: contain;
            background-color: #f5f5f5;
            border-radius: 4px;
            vertical-align: middle;
        }
        .school-name {
            font-weight: 500;
        }
        .school-type {
            color: #666;
            font-size: 12px;
        }
        .homepage-link {
            color: #667eea;
            text-decoration: none;
            font-size: 12px;
        }
        .homepage-link:hover {
            text-decoration: underline;
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="info-container">
        {% if schools %}
        <table>
            <thead>
                <tr>
                    <th></th>
                    <th>School</th>
                    <th>Type</th>
                    <th style="text-align:center;">Tour</th>
                    <th>EOI</th>
                    <th>Link</th>
                </tr>
            </thead>
            <tbody>
                {% for school in schools %}
                <tr>
                    <td>{% if school.sch_logo %}<img src="{{ school.sch_logo }}" alt="" class="school-logo">{% else %}<img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23999'%3E%3Cpath d='M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z'/%3E%3C/svg%3E" alt="" class="school-logo">{% endif %}</td>
                    <td class="school-name">{{ school.sch_name }}</td>
                    <td class="school-type">{{ school.sch_type }}</td>
                    <td style="text-align:center;"><input type="checkbox" disabled {% if school.tour %}checked{% endif %}></td>
                    <td>{{ school.sch_eoi }}</td>
                    <td>{% if school.sch_homepage %}<a href="{{ school.sch_homepage }}" class="homepage-link" target="_blank">↗</a>{% endif %}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <div class="no-data">
            <p>No schools found in the database.</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
