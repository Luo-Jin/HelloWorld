<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schools Information</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #fff;
            padding: 5px;
            font-size: 12px;
            overflow-x: hidden;
            line-height: 1.2;
        }
        .info-container {
            max-width: none;
            margin: 0;
            display: flex;
            flex-direction: row;
            height: 100vh;
            gap: 20px;
            padding: 10px;
        }
        .left-column {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            min-width: 0;
            height: 100%;
            gap: 0;
        }
        .filter-row {
            flex: 0 0 15%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-start;
            padding: 0;
            margin: 15px 0 4px 0;
        }
        .filter-row-group {
            display: flex;
            flex-direction: row;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-start;
            width: 100%;
        }
        .filter-row-group > div {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 4px;
        }
        .list-row {
            flex: 0 0 85%;
            display: flex;
            flex-direction: column;
            min-height: 0;
            gap: 2px;
            position: relative;
        }
        .right-column {
            flex: 0 0 60%;
            display: flex;
            flex-direction: column;
            min-width: 0;
            height: 100%;
            background-color: #f9f9f9;
            border-radius: 5px;
            padding: 20px;
            overflow-y: auto;
        }
        .info-header {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 2px solid #667eea;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .table-wrapper {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 0;
            scrollbar-width: none; /* Firefox */

        }

            min-height: 0;
        }
        .stats-column-left {
            flex: 0 0 300px;

            width: 100%;

        th {
            background-color: #667eea;
            color: white;
            font-weight: 600;
            border-bottom: 2px solid #667eea;
            padding: 10px;
            font-size: 0.85rem;
        }
        .school-logo {
            width: 18px;
            height: 18px;
            object-fit: contain;
            background-color: #f5f5f5;
            border-radius: 4px;

        }
        .school-name {
            font-weight: 500;
        }
        .school-type {

            font-size: 0.85rem;
        }
        select {

        .pagination {

            flex-wrap: wrap;

        .pagination button, .pagination span {

            border: 1px solid #ddd;

            border-color: #667eea;

    </style>
    <!-- Leaflet CSS for mapping -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">
</head>
<body>
    <div class="info-container">
        <div class="left-column">
        <!-- Filter Row -->
        <div class="filter-row">
            <!-- Filter Row Group 1: Region -->
            <div class="filter-row-group">
                <div>
                    <label for="region">Region</label>
                    <select id="region" name="region" onchange="applyFilters()">
                      <option value="">All Regions</option>
                      {% for region in regions %}
                      <option value="{{ region }}" {% if region==selected_region %}selected{% endif %}>{{ region }}</option>
                      {% endfor %}
                    </select>
                </div>
            </div>
            <!-- Filter Row Group 2: School Type -->
            <div class="filter-row-group">
                <div>
                    <label for="schoolType">School Type</label>
                    <select id="schoolType" name="school_type" onchange="applyFilters()">
                      <option value="">All Types</option>
                      {% for type in school_types %}
                      <option value="{{ type }}" {% if type==selected_type %}selected{% endif %}>{{ type }}</option>
                      {% endfor %}
                    </select>
                </div>
            </div>
            <!-- Filter Row Group 3: Search -->
            <div class="filter-row-group">
                <div>
                    <label for="searchSchool">Search</label>
                    <input type="text" id="searchSchool" placeholder="School name" onkeyup="debouncedSearch()">
                </div>
            </div>
        </div>
        <!-- List Row -->
        <div class="list-row">
        <div class="pagination" id="pagination-controls"></div>
        {% if schools %}
        <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th></th>
                    <th>School</th>
                    <th>Type</th>
                    <th>EOI</th>
                </tr>
            </thead>
            <tbody id="schools-list">
                <tr>
                    <td colspan="4" style="text-align: center; padding: 40px; color: #999;">Loading schools...</td>
                </tr>
            </tbody>
        </table>
        </div>
        {% else %}
        <div class="no-data">
            <p>No schools found in the database.</p>
        </div>
        {% endif %}
        </div>
        </div>
        <div class="right-column" id="right-column">
            <div class="school-details-empty">Select a school to view details</div>
        </div>
    </div>
    <script>
        let currentPage = 1;
        let totalPages = 1;
        let allSchools = [];
        let selectedSchoolId = null;
        let searchTimeout = null;

        // Debounced search - waits 300ms after user stops typing
        function debouncedSearch() {
            if (searchTimeout) {
                clearTimeout(searchTimeout);
            }
            searchTimeout = setTimeout(() => {
                applyFilters();
            }, 300);
        }

        function fuzzyMatch(str, pattern) {
            if (!pattern || !str) return true;
            
            const patternLower = pattern.toLowerCase().trim();
            const strLower = str.toLowerCase();
            
            // Direct substring match (most intuitive)
            if (strLower.includes(patternLower)) {
                return true;
            }
            
            // Word-based match: all words in pattern must appear somewhere in str
            const words = patternLower.split(/\s+/).filter(w => w.length > 0);
            if (words.length > 1) {
                const allWordsMatch = words.every(word => strLower.includes(word));
                if (allWordsMatch) return true;
            }
            
            // Sequential character fuzzy match (original behavior)
            let patternIdx = 0;
            for (let i = 0; i < strLower.length && patternIdx < patternLower.length; i++) {
                if (strLower[i] === patternLower[patternIdx]) {
                    patternIdx++;
                }
            }
            return patternIdx === patternLower.length;
        }

        function getFilterParams() {
            const region = document.getElementById('region').value;
            const schoolType = document.getElementById('schoolType').value;
            const search = document.getElementById('searchSchool').value.trim();
            return {
                region: region,
                school_type: schoolType,
                search: search
            };
        }

        function loadSchoolsPage(page) {
            currentPage = page;
            const params = getFilterParams();
            const queryString = new URLSearchParams({
                page: page,
                ...params
            }).toString();
            
            fetch('/api/schools?' + queryString)
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        displaySchools(data.schools);
                        totalPages = data.pages;
                        renderPaginationControls(data.current_page, data.pages);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error loading schools');
                });
        }

        function displaySchools(schools) {
            allSchools = schools;
            const schoolsList = document.getElementById('schools-list');
            
            // Server-side search now handles filtering, just display results
            schoolsList.innerHTML = '';
            
            if (schools.length === 0) {
                schoolsList.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px; color: #999;">No schools found matching filters.</td></tr>';
                document.getElementById('pagination-controls').innerHTML = '';
                return;
            }
            
            schools.forEach(school => {
                const row = document.createElement('tr');
                row.dataset.schoolId = school.sch_id;
                
                let logoHtml = '';
                if (school.sch_logo) {
                    logoHtml = `<img src="${school.sch_logo}" alt="" class="school-logo">`;
                } else {
                    logoHtml = '<img src="data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23999\'%3E%3Cpath d=\'M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z\'/%3E%3C/svg%3E" alt="" class="school-logo">';
                }
                
                const checkboxChecked = school.tour ? 'checked' : '';
                
                row.innerHTML = `
                    <td>${logoHtml}</td>
                    <td class="school-name">${school.sch_name}</td>
                    <td class="school-type">${school.sch_type}</td>
                    <td>${school.sch_eoi}</td>
                `;
                
                row.addEventListener('click', () => selectSchool(school.sch_id, school));
                schoolsList.appendChild(row);
            });
            
            // Auto-select first row
            if (schools.length > 0) {
                const firstRow = schoolsList.querySelector('tr');
                if (firstRow) {
                    const firstSchool = schools[0];
                    selectSchool(firstSchool.sch_id, firstSchool);
                }
            }
        }

        function renderPaginationControls(currentPage, totalPages) {
            const paginationDiv = document.getElementById('pagination-controls');
            paginationDiv.innerHTML = '';
            
            // Previous button
            const prevBtn = document.createElement('button');
            prevBtn.textContent = '← Prev';
            prevBtn.onclick = () => loadSchoolsPage(currentPage - 1);
            if (currentPage <= 1) {
                prevBtn.disabled = true;
                prevBtn.className = 'disabled';
            }
            paginationDiv.appendChild(prevBtn);
            
            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (totalPages <= 7 || i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    if (i === currentPage - 2 && currentPage > 3) {
                        const dots = document.createElement('span');
                        dots.textContent = '...';
                        paginationDiv.appendChild(dots);
                    }
                    if (!(i === currentPage - 2 && currentPage > 3)) {
                        const pageBtn = document.createElement('button');
                        pageBtn.textContent = i;
                        pageBtn.onclick = () => loadSchoolsPage(i);
                        if (i === currentPage) {
                            pageBtn.className = 'active';
                        }
                        paginationDiv.appendChild(pageBtn);
                    }
                }
            }
            
            // Next button
            const nextBtn = document.createElement('button');
            nextBtn.textContent = 'Next →';
            nextBtn.onclick = () => loadSchoolsPage(currentPage + 1);
            if (currentPage >= totalPages) {
                nextBtn.disabled = true;
                nextBtn.className = 'disabled';
            }
            paginationDiv.appendChild(nextBtn);
        }

        function selectSchool(schoolId, schoolData) {
            // Update selected row styling
            const rows = document.querySelectorAll('tbody tr');
            rows.forEach(row => {
                if (parseInt(row.dataset.schoolId) === schoolId) {
                    row.classList.add('selected');
                } else {
                    row.classList.remove('selected');
                }
            });
            
            // Display school details in right column
            displaySchoolDetails(schoolData);
        }
        
        function displaySchoolDetails(school) {
            const rightColumn = document.getElementById('right-column');
            
            // Build the ethnic chart image URL
            const ethnicChartUrl = `/api/school/${school.sch_id}/ethnic-chart`;
            
            // Create display values
            const addressDisplay = school.sch_addr ? `${school.sch_addr}` : 'N/A';
            const websiteDisplay = school.sch_homepage ? 
                `<a href="${school.sch_homepage}" target="_blank" style="color: #00008b; text-decoration: underline; font-style: italic;">${school.sch_homepage}</a>` : 'N/A';
            
            rightColumn.innerHTML = `
                <div class="school-details">
                    <div class="school-details-top">
                        <div class="school-info-wrapper">
                            <div class="school-info-row-1">
                                <h2>${school.sch_name}</h2>
                            </div>
                            <div class="school-info-row-2">
                                <div class="school-info-item">
                                    <span class="school-info-label">Address:</span>
                                    <span class="school-info-detail">${addressDisplay}</span>
                                </div>
                                <div class="school-info-item">
                                    <span class="school-info-label">Website:</span>
                                    <span class="school-info-detail">${websiteDisplay}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="school-details-bottom">
                        <div class="stats-column-left">
                            <div class="ethnic-chart-container">
                                <img src="${ethnicChartUrl}" alt="Ethnic Distribution" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext x=%2250%22 y=%2250%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2214%22 fill=%22%23999%22%3ENo Chart Data%3C/text%3E%3C/svg%3E'">
                            </div>
                            <div class="demographics-container" id="demographics-container">
                                <div class="demographics-title">Loading...</div>
                            </div>
                        </div>
                        <div class="stats-column-right">
                            <div class="school-map-container">
                                <div id="school-map"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Initialize map after HTML is rendered
            setTimeout(() => {
                initializeSchoolMap(school);
            }, 500);
            
            // Fetch and display demographics
            fetchAndDisplayDemographics(school.sch_id);
        }
        
        function getMetricColor(value) {
            // Returns color class based on percentage value
            if (value >= 80) return 'excellent';
            if (value >= 65) return 'good';
            if (value >= 50) return 'average';
            return 'below-average';
        }
        
        function createBadge(label, value) {
            if (value === null || value === undefined) return '';
            const colorClass = getMetricColor(value);
            return `
                <div class="metric-badge ${colorClass}">
                    <div class="metric-badge-label">${label}</div>
                    <div class="metric-badge-value">${value.toFixed(1)}%</div>
                </div>
            `;
        }
        
        function fetchAndDisplayAcademicBadges(schoolId) {
            fetch(`/api/school/${schoolId}/demographics`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to fetch demographics');
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.status === 'success') {
                        displayAcademicBadges(data);
                        // Also display other demographics if needed
                        displayDemographics(data);
                    }
                })
                .catch(error => {
                    console.log('Error fetching academic badges:', error);
                    const badgesContainer = document.getElementById('academic-badges');
                    if (badgesContainer) {
                        badgesContainer.innerHTML = '<div style="color: #999; grid-column: 1/-1;">Unable to load metrics</div>';
                    }
                });
        }
        
        function displayAcademicBadges(data) {
            const badgesContainer = document.getElementById('academic-badges');
            if (!badgesContainer) return;
            
            const metrics = data.demographics || {};
            
            const badges = [
                createBadge('NCEA L1', metrics.ncea_level_1_pass_pct),
                createBadge('NCEA L2', metrics.ncea_level_2_pass_pct),
                createBadge('NCEA L3', metrics.ncea_level_3_pass_pct),
                createBadge('University', metrics.university_entrance_pct),
                createBadge('Retention', metrics.student_retention_pct),
                createBadge('Endorsement', metrics.ncea_endorsement_pct),
            ].filter(b => b !== '').join('');
            
            badgesContainer.innerHTML = badges || '<div style="color: #999; grid-column: 1/-1;">No metric data available</div>';
        }
        
        function fetchAndDisplayDemographics(schoolId) {
            fetch(`/api/school/${schoolId}/demographics`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to fetch demographics');
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.status === 'success') {
                        displayDemographics(data);
                    }
                })
                .catch(error => {
                    console.log('Error fetching demographics:', error);
                    const container = document.getElementById('demographics-container');
                    if (container) {
                        container.innerHTML = '<div class="demographics-title">Demographics data not available</div>';
                    }
                });
        }
        
        function displayDemographics(data) {
            const container = document.getElementById('demographics-container');
            if (!container) return;
            
            const dem = data.demographics;
            const acad = data.academics;
            const engage = data.engagement;
            const perf = data.performance;
            
            // Helper function to create progress bar for percentage values
            const progressBar = (value) => {
                const pct = Math.min(100, Math.max(0, parseFloat(value)));
                return `<div class="demo-kv-bar"><div class="demo-kv-bar-fill" style="width: ${pct}%"></div></div>`;
            };
            
            const html = `
                <div class="demographics-title">Key Metrics</div>
                <div class="demo-kv-pair">
                    <div class="demo-kv-label">Students</div>
                    <div style="display: flex; align-items: center; gap: 4px;"></div>
                    <div class="demo-kv-value">${dem.total_students}</div>
                </div>
                <div class="demo-kv-pair">
                    <div class="demo-kv-label">NCEA L1</div>
                    ${progressBar(acad.ncea_level_1_pass_pct)}
                    <div class="demo-kv-value">${acad.ncea_level_1_pass_pct.toFixed(1)}%</div>
                </div>
                <div class="demo-kv-pair">
                    <div class="demo-kv-label">NCEA L2</div>
                    ${progressBar(acad.ncea_level_2_pass_pct)}
                    <div class="demo-kv-value">${acad.ncea_level_2_pass_pct.toFixed(1)}%</div>
                </div>
                <div class="demo-kv-pair">
                    <div class="demo-kv-label">NCEA L3</div>
                    ${progressBar(acad.ncea_level_3_pass_pct)}
                    <div class="demo-kv-value">${acad.ncea_level_3_pass_pct.toFixed(1)}%</div>
                </div>
                <div class="demo-kv-pair">
                    <div class="demo-kv-label">University</div>
                    ${progressBar(acad.university_entrance_pct)}
                    <div class="demo-kv-value">${acad.university_entrance_pct.toFixed(1)}%</div>
                </div>
                <div class="demo-kv-pair">
                    <div class="demo-kv-label">Retention</div>
                    ${progressBar(engage.student_retention_pct)}
                    <div class="demo-kv-value">${engage.student_retention_pct.toFixed(1)}%</div>
                </div>
            `;
            
            container.innerHTML = html;
        }
        
        
        let map = null;
        let currentMarker = null;
        
        function initializeSchoolMap(school) {
            const mapElement = document.getElementById('school-map');
            if (!mapElement) {
                console.log('Map element not found');
                return;
            }
            
            // Destroy existing map if any
            if (map) {
                try {
                    map.remove();
                } catch(e) {
                    console.log('Error removing old map:', e);
                }
                map = null;
            }
            
            try {
                // Initialize map with default center (Auckland, NZ)
                map = L.map('school-map', {
                    preferCanvas: true
                }).setView([-37.7749, 174.8860], 13);
                
                // Add tile layer
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                    maxZoom: 19,
                    zIndex: 1
                }).addTo(map);
                
                // Recalculate map size after rendering
                setTimeout(() => {
                    map.invalidateSize();
                }, 200);
                
                // Second invalidateSize for good measure
                setTimeout(() => {
                    map.invalidateSize();
                }, 500);
                
                console.log('Map initialized successfully');
                
                // Check if we have stored coordinates first
                if (school.latitude && school.longitude) {
                    console.log(`Using stored coordinates: [${school.latitude}, ${school.longitude}]`);
                    
                    // Remove old marker if exists
                    if (currentMarker) {
                        map.removeLayer(currentMarker);
                    }
                    
                    // Add marker and update map view
                    currentMarker = L.marker([school.latitude, school.longitude]).addTo(map)
                        .bindPopup(`<strong>${school.sch_name}</strong><br>${school.sch_addr || ''}`);
                    
                    map.setView([school.latitude, school.longitude], 15);
                }
                // Fall back to geocoding if no stored coordinates
                else if (school.sch_addr) {
                    console.log('No stored coordinates, attempting to geocode address:', school.sch_addr);
                    geocodeAddress(school.sch_addr, school.sch_name, school.sch_id);
                } else {
                    console.log('No address for school:', school.sch_name);
                }
            } catch(error) {
                console.log('Error initializing map:', error);
            }
        }
        
        function geocodeAddress(address, schoolName, schoolId) {
            if (!address || !map) {
                console.log('Missing address or map not initialized');
                return;
            }
            
            // Clean up address - remove extra spaces before commas
            const cleanAddress = address.replace(/\s+,/g, ',').replace(/,\s+/g, ', ').trim();
            
            // Extract parts: "140 Birkdale Road, Birkenhead, Auckland" -> ["140 Birkdale Road", "Birkenhead", "Auckland"]
            const parts = cleanAddress.split(',').map(p => p.trim());
            const streetPart = parts[0] || '';
            const suburbPart = parts[1] || '';
            
            // Build queries in order of specificity
            const queries = [
                `${cleanAddress}, New Zealand`,  // Full address
                `${streetPart}, ${suburbPart}, New Zealand`,  // Street + suburb
                `${schoolName}, ${suburbPart}, New Zealand`,  // School name + suburb
                `${schoolName}, New Zealand`,  // Just school name
                `${suburbPart}, New Zealand`  // Just suburb as fallback
            ];
            
            tryGeocode(queries, 0, schoolName, cleanAddress, schoolId);
        }
        
        function tryGeocode(queries, index, schoolName, address, schoolId) {
            if (index >= queries.length) {
                console.log(`Failed to geocode all variants for ${schoolName} using queries:`, queries);
                // Default to Auckland center if all fail
                if (map) {
                    map.setView([-37.7749, 174.8860], 13);
                }
                return;
            }
            
            const query = queries[index];
            const geocodeUrl = `/api/geocode?q=${encodeURIComponent(query)}`;
            
            console.log(`Attempting geocode (${index + 1}/${queries.length}): ${query}`);
            
            fetch(geocodeUrl)
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success' && data.results && data.results.length > 0) {
                        const lat = parseFloat(data.results[0].lat);
                        const lon = parseFloat(data.results[0].lon);
                        
                        console.log(`✓ Geocoded: ${schoolName} at [${lat}, ${lon}]`);
                        
                        // Save coordinates to database for future use
                        if (schoolId) {
                            fetch(`/api/school/${schoolId}/coordinates`, {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({latitude: lat, longitude: lon})
                            }).then(() => console.log('Coordinates saved'))
                              .catch(e => console.log('Failed to save coordinates:', e));
                        }
                        
                        // Remove old marker if exists
                        if (currentMarker) {
                            map.removeLayer(currentMarker);
                        }
                        
                        // Add marker and update map view
                        currentMarker = L.marker([lat, lon]).addTo(map)
                            .bindPopup(`<strong>${schoolName}</strong><br>${address}`);
                        
                        map.setView([lat, lon], 15);
                    } else {
                        console.log(`✗ No results for: ${query}`);
                        // Try next query
                        setTimeout(() => {
                            tryGeocode(queries, index + 1, schoolName, address, schoolId);
                        }, 500);
                    }
                })
                .catch(error => {
                    console.log(`✗ Error geocoding ${query}:`, error);
                    // Try next query
                    setTimeout(() => {
                        tryGeocode(queries, index + 1, schoolName, address, schoolId);
                    }, 500);
                });
        }

        function applyFilters(){
            // Reset to page 1 when filters are applied
            const rightColumn = document.getElementById('right-column');
            rightColumn.innerHTML = '<div class="school-details-empty">Select a school to view details</div>';
            
            // Clean up map
            if (map) {
                map.remove();
                map = null;
            }
            
            loadSchoolsPage(1);
        }

        // Load first page on page load
        document.addEventListener('DOMContentLoaded', function() {
            const schoolsList = document.getElementById('schools-list');
            if (schoolsList) {
                loadSchoolsPage(1);
            }
        });
    </script>
